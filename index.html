<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cita — Daniel Pérez</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,600&family=Inter:wght@400;600&display=swap');

  :root{
    --teal:#2ad6bc;
    --ink:#1a1a1a;
    --muted:#6b7280;
    --hair:#d8dcde;
    --bg:#ffffff;
  }

  *{box-sizing:border-box;}

  .quote-card{
    --maxw:760px;
    max-width:var(--maxw);
    margin:2.5rem auto;
    padding:0 1.5rem;
    background:var(--bg);
    font-family:'Inter',system-ui,sans-serif;
  }

  .quote-card .rule-top{
    display:flex;
    align-items:center;
    margin-bottom:1.6rem;
  }
  .quote-card .rule-top .seg-teal{
    height:4px;width:46%;background:var(--teal);border-radius:2px;
  }
  .quote-card .rule-top .seg-hair{
    height:1px;flex:1;background:var(--hair);
  }

  .quote-card .quote-body{
    display:flex;
    gap:1.8rem;
    align-items:flex-end;
  }

  .quote-card .quote-text-wrap{flex:1;min-width:0;}

  .quote-card blockquote{
    margin:0;
    font-family:'Lora',Georgia,serif;
    font-weight:600;
    font-size:1.6rem;
    line-height:1.4;
    color:var(--ink);
    letter-spacing:-0.01em;
  }

  .quote-card .attribution{
    margin-top:1.4rem;
    line-height:1.3;
  }
  .quote-card .attribution .name{
    font-family:'Lora',Georgia,serif;
    font-weight:700;
    font-size:1.05rem;
    color:var(--ink);
  }
  .quote-card .attribution .role{
    display:block;
    font-size:.9rem;
    font-weight:600;
    letter-spacing:.02em;
    text-transform:uppercase;
    color:var(--teal);
    margin-top:.15rem;
  }

  .quote-card .photo{
    flex:0 0 150px;
    align-self:flex-end;
  }
  .quote-card .photo img{
    display:block;
    width:100%;
    height:auto;
    filter:grayscale(100%) contrast(1.02);
  }

  .quote-card .rule-bottom{
    display:flex;
    align-items:center;
    margin-top:1.6rem;
  }
  .quote-card .rule-bottom .seg-hair{
    height:1px;flex:1;background:var(--hair);
  }
  .quote-card .rule-bottom .seg-teal{
    height:4px;width:46%;background:var(--teal);border-radius:2px;
  }

  @media (max-width:560px){
    .quote-card blockquote{font-size:1.25rem;}
    .quote-card .photo{flex:0 0 110px;}
  }
</style>
</head>
<body>

  <figure class="quote-card">
    <div class="rule-top">
      <span class="seg-teal"></span>
      <span class="seg-hair"></span>
    </div>

    <div class="quote-body">
      <div class="quote-text-wrap">
        <blockquote>
          &ldquo;És viable tenir tots els parcs eòlics repotenciats el 2036&rdquo;
        </blockquote>
        <figcaption class="attribution">
          <span class="name">Daniel Pérez</span>
          <span class="role">Director general de L'Energètica</span>
        </figcaption>
      </div>

      <div class="photo">
        <img src="https://d5r1tkwwv7d5g.cloudfront.net/periodicos/periodico-68.png" alt="Daniel Pérez, director general de L'Energètica">
      </div>
    </div>

    <div class="rule-bottom">
      <span class="seg-hair"></span>
      <span class="seg-teal"></span>
    </div>
  </figure>

<script>
function enviarAltura() {
  const altura = document.body.scrollHeight;
  window.parent.postMessage(
    { tipus: 'resize-iframe-perez', alçada: altura },
    '*'
  );
}
window.addEventListener('load', enviarAltura);
window.addEventListener('resize', enviarAltura);
window.addEventListener('message', function(e) {
  if (e.data && e.data.tipus === 'request-resize') {
    enviarAltura();
  }
});
const observer = new ResizeObserver(enviarAltura);
observer.observe(document.body);
</script>

</body>
</html>
